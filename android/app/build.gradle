apply plugin: 'com.android.application'

android {
    namespace "com.littlewitchadventure"
    compileSdk 34
    ndkVersion "27.0.12077973"

    defaultConfig {
        applicationId "com.littlewitchadventure"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64', 'x86'
        }

        externalNativeBuild {
            cmake {
                arguments "-DPLATFORM=Android", "-DANDROID_STL=c++_shared"
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    externalNativeBuild {
        cmake {
            path "../../CMakeLists.txt"
            version "3.22.1"
        }
    }

    sourceSets {
        main {
            assets.srcDirs = ['../../assets']
        }
    }
}

dependencies {
    implementation 'com.google.android.gms:play-services-ads:23.0.0'
}
